services:
  - type: web
    name: bastet-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bastet-db
          property: connectionString
      - key: GEOAPI_KEY
        sync: false
      - key: ADMIN_AUTH_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false

databases:
  - name: bastet-db
    plan: free